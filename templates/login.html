<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GestAppart — Connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: #1a1a2e;
            border: 1px solid #2a2a3b;
            border-radius: 20px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon { font-size: 2.8em; display: block; margin-bottom: 10px; }
        .logo h1 { font-size: 1.6em; color: #4CAF50; font-weight: 600; }
        .logo p { font-size: 0.82em; color: #555; margin-top: 4px; }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 0.82em;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .05em;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            background: #0f0f1a;
            border: 1px solid #2a2a3b;
            border-radius: 10px;
            color: white;
            font-size: 1em;
            font-family: inherit;
            transition: border-color .2s;
        }
        input[type="password"]:focus { outline: none; border-color: #4CAF50; }
        button[type="submit"] {
            width: 100%;
            padding: 13px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: background .2s, transform .15s;
            margin-top: 4px;
        }
        button[type="submit"]:hover { background: #45a049; transform: translateY(-1px); }
        button[type="submit"]:active { transform: translateY(0); }
        .error-msg {
            background: rgba(231,76,60,0.12);
            border: 1px solid rgba(231,76,60,0.3);
            color: #e74c3c;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85em;
            margin-bottom: 20px;
            text-align: center;
        }
        .footer-note { text-align: center; font-size: 0.75em; color: #333; margin-top: 24px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <span class="logo-icon">🏠</span>
            <h1>GestAppart</h1>
            <p>Administration</p>
        </div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password" placeholder="••••••••" autofocus>
            </div>
            <button type="submit">Connexion</button>
        </form>

        <div class="footer-note">Accès réservé à l'administrateur</div>
    </div>
</body>
</html>
